syntax = "proto3";
package chat_server;

import "google/protobuf/timestamp.proto";

message User {
  uint64 id = 1;
  string display_name = 2;
}

message Message {
  uint64 id = 1;
  uint64 room_id = 2;
  uint64 sender_id = 3;

  string content = 4;
  google.protobuf.Timestamp time_stamp = 5;
}

message Room {
  uint64 id = 1;
  string name = 2;
  repeated User members = 3;
}
